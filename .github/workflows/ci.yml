name: ci
on:
  pull_request:
  push:
    branches:
      - main
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3"
          elixir-version: "1"
          gleam-version: "1"

      - uses: oven-sh/setup-bun@v2

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci

      - uses: actions/checkout@v6
        with:
          repository: WhatsApp/erlfmt
          path: _temp/erlfmt

      - id: cache-erlfmt
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/erlfmt
          key: ${{ runner.os }}-erlfmt-${{ hashFiles('_temp/erlfmt/src/erlfmt.app.src') }}

      - if: ${{ !steps.cache-erlfmt.outputs.cache-hit }}
        run: |
          cd _temp/erlfmt
          rebar3 as release escriptize
          mv _build/release/bin/erlfmt /usr/local/bin/

      - id: cache-gleam
        uses: actions/cache@v5
        with:
          path: build/packages
          key: ${{ runner.os }}-gleam-${{ hashFiles('manifest.toml') }}

      - if: ${{ !steps.cache-gleam.outputs.cache-hit }}
        run: gleam deps download

      - run: |
          cd test_projects/node_project
          mkdir -p node_modules/{.bin,@tynanbe}
          ln -fs ../../../../ node_modules/@tynanbe/kindly
          ln -fs ../@tynanbe/kindly/priv/dist/cli.js node_modules/.bin/kindly

      - run: gleam run -m kindly ci
